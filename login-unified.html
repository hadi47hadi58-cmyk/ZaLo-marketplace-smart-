<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دخول ZaLo الموحد</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --green: #1a5c2a;
      --green-light: #2d7a3a;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --red: #e53935;
      --gray: #666;
      --bg: #f5f5f5;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #f5f5f5, #e8f0ea);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      width: 100%;
      max-width: 450px;
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 10px 40px rgba(26,92,42,0.15);
    }
    .header {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-large { font-size: 60px; margin-bottom: 12px; }
    .brand-name {
      font-size: 28px;
      font-weight: 900;
      color: #1a5c2a;
      margin-bottom: 4px;
    }
    .brand-name .gold { color: #c9a84c; }
    .tagline {
      font-size: 13px;
      color: #666;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    input {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      transition: all 0.2s;
      outline: none;
    }
    input:focus {
      border-color: #1a5c2a;
      box-shadow: 0 0 0 3px rgba(26,92,42,0.1);
    }
    .role-detected {
      background: #f0f8f2;
      border: 2px solid #1a5c2a;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 16px;
      text-align: center;
      font-size: 13px;
      color: #1a5c2a;
      font-weight: 700;
      display: none;
      animation: slideIn 0.3s ease-out;
    }
    .role-detected.show { display: block; }
    .btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #1a5c2a, #2d7a3a);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(26,92,42,0.3);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .forgot-pass {
      text-align: center;
      margin-top: 16px;
    }
    .forgot-pass a {
      font-size: 12px;
      color: #1a5c2a;
      text-decoration: none;
      font-weight: 700;
    }
    .error-msg {
      background: #ffebee;
      color: #c0392b;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 12px;
      display: none;
    }
    .error-msg.show { display: block; }
    .loading { display: none; text-align: center; font-size: 12px; color: #666; }
    .loading.show { display: block; }
    .register-link {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #666;
    }
    .register-link a {
      color: #1a5c2a;
      text-decoration: none;
      font-weight: 700;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-large">🏛️</div>
    <div class="brand-name">Za<span class="gold">Lo</span></div>
    <div class="tagline">تسجيل دخول موحد ذكي</div>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="role-detected" id="roleDetected"></div>

  <form onsubmit="handleLogin(event)" id="loginForm">
    <div class="form-group">
      <label for="email">البريد الإلكتروني</label>
      <input 
        type="email" 
        id="email" 
        placeholder="example@gmail.com"
        oninput="detectUserRole()"
        required
      >
    </div>

    <div class="form-group">
      <label for="password">كلمة المرور</label>
      <input 
        type="password" 
        id="password" 
        placeholder="••••••••"
        required
      >
    </div>

    <button type="submit" class="btn" id="loginBtn">🔓 دخول</button>
    <div class="loading" id="loading">⏳ جاري التحقق...</div>
  </form>

  <div class="forgot-pass">
    <a href="#" onclick="resetPassword(event)">نسيت كلمة المرور؟</a>
  </div>

  <div class="register-link">
    لا تملك حساب؟ <a href="register-step1.html">سجل الآن</a>
  </div>
</div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import { getFirestore, doc, getDoc, collection, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyDTTM8qt9MBpy9MzLnyd17_shNulkQb9Hw",
    authDomain: "zalo-marketplace-smart-final.firebaseapp.com",
    projectId: "zalo-marketplace-smart-final",
    storageBucket: "zalo-marketplace-smart-final.firebasestorage.app",
    messagingSenderId: "393402903971",
    appId: "1:393402903971:web:7c521e8cb7b823d306be16"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  window._auth = auth;
  window._db = db;

  window.detectUserRole = async function() {
    const email = document.getElementById('email').value.trim().toLowerCase();
    const roleDetected = document.getElementById('roleDetected');
    
    if (!email) {
      roleDetected.classList.remove('show');
      return;
    }

    if (email === 'zinzinochop@gmail.com') {
      roleDetected.innerHTML = '🛡️ حساب المدير العام للمنصة (Super Admin)';
      roleDetected.className = 'role-detected show';
      roleDetected.style.borderColor = '#c9a84c';
      roleDetected.style.color = '#c9a84c';
      roleDetected.style.background = '#fefbef';
      return;
    }

    try {
      const adminSnap = await getDoc(doc(db, 'admins', email));
      if (adminSnap.exists()) {
        roleDetected.innerHTML = '🛡️ حساب إداري (مشرف ولاية/جهة)';
        roleDetected.className = 'role-detected show';
        roleDetected.style.borderColor = '#1a5c2a';
        roleDetected.style.color = '#1a5c2a';
        roleDetected.style.background = '#f0f8f2';
        return;
      }

      const q = query(collection(db, 'users'), where('email', '==', email));
      const qSnap = await getDocs(q);
      if (!qSnap.empty) {
        const u = qSnap.docs[0].data();
        if (u.role === 'merchant') {
          roleDetected.innerHTML = '🏪 حساب تاجر شريك معتمد';
        } else {
          roleDetected.innerHTML = '👤 حساب زبون / عميل';
        }
        roleDetected.className = 'role-detected show';
        roleDetected.style.borderColor = '#1a5c2a';
        roleDetected.style.color = '#1a5c2a';
        roleDetected.style.background = '#f0f8f2';
        return;
      }
    } catch(err) {
      console.warn("Role detection error:", err);
    }
  }

  window.handleLogin = async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = document.getElementById('password').value;
    const loginBtn = document.getElementById('loginBtn');
    const loading = document.getElementById('loading');
    const errorMsg = document.getElementById('errorMsg');

    errorMsg.classList.remove('show');
    loginBtn.disabled = true;
    loading.classList.add('show');

    try {
      const cred = await signInWithEmailAndPassword(auth, email, password);
      const user = cred.user;

      let userRole = 'customer';
      let redirectUrl = 'index.html';

      if (email === 'zinzinochop@gmail.com') {
        userRole = 'admin';
        redirectUrl = 'admin.html';
      } else {
        const adminSnap = await getDoc(doc(db, 'admins', email));
        if (adminSnap.exists() || adminSnap.data()?.role === 'super_admin' || adminSnap.data()?.role === 'admin') {
          await signOut(auth);
          throw { code: 'auth/unauthorized-admin', message: 'عذراً، الدخول الإداري مخصص للمدير العام فقط عبر البريد المعتمد الوحيد.' };
        }

        const userDoc = await getDoc(doc(db, 'users', user.uid));
        if (userDoc.exists()) {
          const uData = userDoc.data();
          userRole = uData.role || 'customer';
          
          if (userRole === 'admin' || userRole === 'super_admin' || userRole === 'support') {
            await signOut(auth);
            throw { code: 'auth/unauthorized-admin', message: 'عذراً، الدخول الإداري مخصص للمدير العام فقط عبر البريد المعتمد الوحيد.' };
          }

          if (userRole === 'merchant') {
            redirectUrl = 'dashboard.html';
          } else {
            redirectUrl = 'index.html';
          }
        }
      }

      localStorage.setItem('user_uid', user.uid);
      localStorage.setItem('user_email', email);
      localStorage.setItem('user_role', userRole);
      sessionStorage.setItem('user_logged_in', 'true');

      window.location.href = redirectUrl;

    } catch (err) {
      console.error(err);
      let errMsgText = 'البريد الإلكتروني أو كلمة المرور غير صحيحة.';
      if (err.code === 'auth/unauthorized-admin') {
        errMsgText = err.message;
      } else if (err.code === 'auth/user-not-found') {
        errMsgText = 'البريد الإلكتروني غير مسجل، سجل حساب جديداً.';
      } else if (err.code === 'auth/wrong-password') {
        errMsgText = 'كلمة المرور غير صحيحة.';
      } else if (err.code === 'auth/too-many-requests') {
        errMsgText = 'تم حجب المحاولات مؤقتاً لتكرار الفشل. جرب لاحقاً.';
      }
      errorMsg.textContent = errMsgText;
      errorMsg.classList.add('show');
    } finally {
      loginBtn.disabled = false;
      loading.classList.remove('show');
    }
  }

  window.resetPassword = async function(e) {
    e.preventDefault();
    const email = document.getElementById('email').value.trim().toLowerCase();
    if (!email) {
      alert('الرجاء إدخال البريد الإلكتروني الخاص بك أولاً.');
      return;
    }
    try {
      await sendPasswordResetEmail(auth, email);
      alert('✅ تم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني بنجاح!');
    } catch (err) {
      alert('❌ خطأ: ' + err.message);
    }
  }

  window.addEventListener('load', () => {
    signOut(auth).catch(() => {});
  });
</script>
</body>
</html>
