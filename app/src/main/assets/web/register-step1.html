<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل جديد - الخطوة 1</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #f5f5f5, #e8f0ea);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
    }
    .container {
      width: 100%;
      max-width: 450px;
      background: white;
      border-radius: 16px;
      padding: 32px 24px;
      box-shadow: 0 10px 40px rgba(26,92,42,0.15);
    }
    .header {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-large { font-size: 50px; margin-bottom: 12px; }
    .title {
      font-size: 24px;
      font-weight: 900;
      color: #1a5c2a;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 12px;
      color: #666;
    }
    .progress-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      justify-content: center;
    }
    .progress-step {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: #e0e0e0;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 12px;
      transition: all 0.2s;
    }
    .progress-step.active {
      background: #1a5c2a;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    input, select {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      transition: all 0.2s;
      outline: none;
      min-height: 48px;
    }
    input:focus, select:focus {
      border-color: #1a5c2a;
      box-shadow: 0 0 0 3px rgba(26,92,42,0.1);
    }
    .type-selector {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }
    .type-btn {
      flex: 1;
      padding: 10px;
      border: 2px solid #e0e0e0;
      background: white;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 44px;
    }
    .type-btn.selected {
      border-color: #1a5c2a;
      background: rgba(26,92,42,0.1);
      color: #1a5c2a;
    }
    .buttons {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-next {
      background: linear-gradient(135deg, #1a5c2a, #2d7a3a);
      color: white;
    }
    .btn-next:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .btn-back {
      background: #e0e0e0;
      color: #1a1a1a;
    }
    .login-link {
      text-align: center;
      margin-top: 16px;
      font-size: 12px;
      color: #666;
    }
    .login-link a {
      color: #1a5c2a;
      text-decoration: none;
      font-weight: 700;
    }
    @media (max-width: 600px) {
      html, body {
        padding: 8px 12px !important;
        overflow: hidden !important; /* No-Scroll policy */
        height: 100vh !important;
        height: 100dvh !important;
        justify-content: center !important;
      }
      .container {
        padding: 16px 14px !important;
        border-radius: 12px !important;
      }
      .header {
        margin-bottom: 12px !important;
      }
      .logo-large {
        font-size: 32px !important;
        margin-bottom: 4px !important;
      }
      .title {
        font-size: 18px !important;
      }
      .subtitle {
        font-size: 11px !important;
      }
      .progress-bar {
        margin-bottom: 12px !important;
      }
      .progress-step {
        width: 24px !important;
        height: 24px !important;
        font-size: 11px !important;
      }
      .form-group {
        margin-bottom: 10px !important;
      }
      label {
        font-size: 11px !important;
        margin-bottom: 4px !important;
      }
      input, select {
        padding: 10px !important;
        font-size: 13px !important;
        min-height: 40px !important;
      }
      .type-selector {
        gap: 6px !important;
      }
      .type-btn {
        padding: 8px !important;
        font-size: 11px !important;
        min-height: 36px !important;
      }
      .buttons {
        margin-top: 12px !important;
      }
      .btn {
        padding: 10px !important;
        font-size: 13px !important;
        min-height: 40px !important;
      }
      .login-link {
        margin-top: 10px !important;
        font-size: 11px !important;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo-large">🏛️</div>
    <div class="title">تسجيل جديد</div>
    <div class="subtitle">أنشئ حسابك في ZaLo</div>
  </div>

  <div class="progress-bar">
    <div class="progress-step active">1</div>
    <div class="progress-step">2</div>
    <div class="progress-step">3</div>
  </div>

  <form onsubmit="goToStep2(event)" id="step1Form">
    <div class="form-group">
      <label>نوع الحساب</label>
      <div class="type-selector">
        <button type="button" class="type-btn selected" onclick="selectType('customer')">👤 عميل</button>
        <button type="button" class="type-btn" onclick="selectType('merchant')">🏪 تاجر</button>
      </div>
      <input type="hidden" id="userType" value="customer" required>
    </div>

    <div class="form-group">
      <label for="fullName">الاسم الكامل</label>
      <input 
        type="text" 
        id="fullName" 
        placeholder="أحمد محمد علي"
        required
      >
    </div>

    <div class="buttons">
      <button type="button" class="btn btn-back" onclick="goToLogin()">← الدخول</button>
      <button type="submit" class="btn btn-next" id="nextBtn">التالي →</button>
    </div>
  </form>

  <div class="login-link">
    تملك حساب؟ <a href="login.html">ادخل الآن</a>
  </div>
</div>

<script>
  function selectType(type) {
    document.getElementById('userType').value = type;
    document.querySelectorAll('.type-btn').forEach(btn => btn.classList.remove('selected'));
    // Since we handle both admin and merchant or customer, admin cannot self sign-up here (restricted)
    event.currentTarget.classList.add('selected');
  }

  function goToStep2(e) {
    e.preventDefault();
    const userType = document.getElementById('userType').value;
    const fullName = document.getElementById('fullName').value;

    if (!userType || !fullName) {
      alert('يرجى ملء جميع الحقول');
      return;
    }

    sessionStorage.setItem('reg_userType', userType);
    sessionStorage.setItem('reg_fullName', fullName);

    window.location.href = 'register-step2.html';
  }

  function goToLogin() {
    window.location.href = 'login.html';
  }
</script>

</body>
</html>
