<!DOCTYPE html>
<!-- ZaLo Marketplace Smart-Spark Final Version Update (Sync Trigger) -->
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZaLo - السوق الذكي الجزائري</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; }
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(135deg, #1a5c2a 0%, #2d7a3a 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    @media (min-width: 641px) {
      html {
        background: radial-gradient(circle at center, #1b3823 0%, #07130b 100%) !important;
        height: 100vh !important;
        overflow: hidden !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
      }
      body {
        width: 410px !important;
        height: 860px !important;
        max-height: calc(100vh - 40px) !important;
        position: relative !important;
        margin: 0 auto !important;
        background: linear-gradient(135deg, #1a5c2a 0%, #2d7a3a 100%) !important;
        box-shadow: 0 25px 50px rgba(0,0,0,0.6) !important;
        border: 10px solid #1c2b20 !important;
        border-radius: 38px !important;
        overflow: hidden !important;
        display: flex !important;
        flex-direction: column !important;
        justify-content: center !important;
        box-sizing: border-box !important;
      }
    }
    .splash-container {
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .logo {
      font-size: 100px;
      animation: bounce 0.8s ease-in-out infinite;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,0.3));
    }
    .brand {
      font-size: 36px;
      font-weight: 900;
      color: white;
      letter-spacing: 2px;
    }
    .brand .gold { color: #e8c97a; }
    .tagline {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      font-weight: 600;
    }
    .loader {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }
    .subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      position: absolute;
      bottom: 30px;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-30px) scale(1.05); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="splash-container">
    <div class="logo">🏛️</div>
    <div class="brand">Za<span class="gold">Lo</span></div>
    <div class="tagline">السوق الذكي الجزائري</div>
    <div class="loader"></div>
  </div>
  <div class="subtitle">جاري التحضير...</div>

  <script>
    sessionStorage.clear();
    localStorage.removeItem('user_logged_in');
    localStorage.removeItem('user_role');
    localStorage.removeItem('user_uid');
    localStorage.removeItem('user_email');

    setTimeout(() => {
      window.location.href = 'index.html';
    }, 2000);
  </script>
</body>
</html>
