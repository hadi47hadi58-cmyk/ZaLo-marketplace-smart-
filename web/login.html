<!DOCTYPE html>
<!-- ZaLo Marketplace Smart-Spark Final Version Update (Sync Trigger) -->
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ZaLo - بوابـة الدخول الموحدة</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a5c2a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="#1a5c2a">
  <link class="apple-touch-icon" href="assets/icon-192.svg">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --green: #1a5c2a;
      --green-light: #2d7a3a;
      --green-dark: #071a0b;
      --gold: #c9a84c;
      --gold2: #e8c97a;
      --bg: #080e0a;
      --card: #111a14;
      --border: #1e3028;
      --text: #e8f0ea;
      --text2: #7a9e83;
      --red: #ff4d4d;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      position: relative;
      overflow-y: auto;
      overflow-x: hidden;
      width: 100%;
      max-width: 100%;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(26,92,42,0.22) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 100%, rgba(37,168,96,0.1) 0%, transparent 50%);
      pointer-events: none;
      z-index: 1;
    }

    .wrapper {
      width: 100%; max-width: 460px;
      position: relative; z-index: 10;
      animation: fadeUp 0.5s ease-out;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(24px); }
      to { opacity:1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center; margin-bottom: 24px;
    }
    .logo-outer {
      width: 100px; height: 100px;
      margin: 0 auto 12px;
      padding: 4px;
      border: 2px dashed var(--gold);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(26,92,42,0.2);
    }
    .logo-inner {
      width: 86px; height: 86px;
      background: var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 8px 24px rgba(26,92,42,0.4);
    }
    .logo-inner img {
      width: 50px; height: 50px;
    }
    .brand-title {
      font-size: 26px; font-weight: 900; color: #fff; letter-spacing: 0.5px;
    }
    .brand-subtitle {
      font-size: 13px; color: var(--gold2); font-weight: 700; margin-top: 3px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 24px 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.55);
      margin-bottom: 24px;
    }

    .card-title {
      font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 8px; text-align: center;
    }
    .card-desc {
      font-size: 13px; color: var(--text2); text-align: center; margin-bottom: 18px;
    }

    /* BADGES OF ACCOUNT DETECTION */
    .badge-container {
      display: flex; justify-content: center; margin-bottom: 20px;
    }
    .detected-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 16px; border-radius: 20px;
      font-size: 13px; font-weight: 800;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: 1.5px solid transparent;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(26,92,42,0.4); }
      70% { box-shadow: 0 0 0 8px rgba(26,92,42,0); }
      100% { box-shadow: 0 0 0 0 rgba(26,92,42,0); }
    }

    /* Badge Themes */
    .badge-customer {
      background: rgba(26, 92, 42, 0.15);
      border-color: var(--green);
      color: #9cdcb0;
    }
    .badge-merchant {
      background: rgba(201, 168, 76, 0.15);
      border-color: var(--gold);
      color: var(--gold2);
    }
    .badge-admin {
      background: rgba(255, 77, 77, 0.15);
      border-color: var(--red);
      color: #ff9999;
    }

    .form-group {
      margin-bottom: 18px; text-align: right;
    }
    .form-label {
      display: block; font-size: 13px; font-weight: 700;
      color: var(--gold2); margin-bottom: 6px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute; right: 14px; top: 50%;
      transform: translateY(-50%); color: var(--text2); font-size: 14px;
    }
    .form-input {
      width: 100%;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 38px 12px 14px;
      color: #fff; font-family: inherit; font-size: 14px;
      transition: all 0.25s ease;
    }
    .form-input:focus {
      outline: none; border-color: var(--gold);
      box-shadow: 0 0 10px rgba(201,168,76,0.15);
      background: rgba(0,0,0,0.4);
    }

    .submit-btn {
      width: 100%; background: var(--green);
      border: 1px solid var(--gold);
      color: #fff; font-family: inherit; font-size: 15px; font-weight: 800;
      padding: 13px; border-radius: 14px; cursor: pointer;
      box-shadow: 0 8px 24px rgba(26,92,42,0.25);
      transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .submit-btn:hover {
      background: var(--green-light); transform: translateY(-1px);
    }
    .submit-btn:active { transform: translateY(0); }

    .separator {
      display: flex; align-items: center; text-align: center;
      margin: 20px 0; color: var(--text2); font-size: 12px;
    }
    .separator::before, .separator::after {
      content: ''; flex: 1; border-bottom: 1px solid var(--border);
    }
    .separator:not(:empty)::before { margin-left: 10px; }
    .separator:not(:empty)::after { margin-right: 10px; }

    .google-btn {
      width: 100%; background: #ffffff; color: #1a1a1a;
      border: none; font-family: inherit; font-size: 14px; font-weight: 700;
      padding: 12px; border-radius: 14px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: all 0.2s;
    }
    .google-btn:hover { background: #f2f2f2; transform: translateY(-1px); }

    .error-msg {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.2);
      color: var(--red); padding: 10px; border-radius: 12px;
      font-size: 12px; margin-bottom: 16px; text-align: center;
      display: none;
    }

    /* DEMO ACCOUNTS AREA */
    .demo-grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-top: 10px;
    }
    .demo-card {
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 10px; padding: 10px 4px;
      text-align: center; cursor: pointer; transition: all 0.2s;
    }
    .demo-card:hover {
      background: rgba(201, 168, 76, 0.12);
      border-color: var(--gold);
      transform: translateY(-1px);
    }
    .demo-card i { font-size: 15px; margin-bottom: 4px; display: block; }
    .demo-card .role-name { font-size: 11px; font-weight: 800; color: var(--text); }
    .demo-card .role-email { font-size: 9px; color: var(--text2); display: block; margin-top: 2px; }

    /* HOW IT WORKS TIMELINE */
    .info-section {
      background: rgba(255,255,255,0.01);
      border: 1px dashed var(--border);
      border-radius: 20px; padding: 20px; margin-top: 12px;
    }
    .info-title {
      font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 14px;
      display: flex; align-items: center; gap: 8px; justify-content: center;
    }
    .timeline {
      display: flex; flex-direction: column; gap: 14px;
    }
    .timeline-item {
      display: flex; gap: 12px; align-items: flex-start; text-align: right;
    }
    .timeline-num {
      width: 24px; height: 24px; border-radius: 6px;
      background: var(--green); color: #fff; font-size: 12px; font-weight: 900;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
      border: 1px solid var(--gold);
    }
    .timeline-text h4 {
      font-size: 13px; font-weight: 800; color: var(--gold2); margin-bottom: 2px;
    }
    .timeline-text p {
      font-size: 11px; color: var(--text2); line-height: 1.5;
    }

    .back-btn {
      position: absolute; top: 12px; right: 12px;
      color: var(--text2); text-decoration: none; font-size: 13px; font-weight: 800;
      display: flex; align-items: center; gap: 6px; z-index: 15;
    }
    .back-btn:hover { color: #fff; }

    @media (max-width: 600px) {
      html, body {
        padding: 8px 12px !important;
        overflow: hidden !important; /* No-Scroll policy */
        height: 100vh !important;
        height: 100dvh !important;
        justify-content: center !important;
      }
      .wrapper {
        max-width: 100% !important;
      }
      .logo-area {
        margin-bottom: 10px !important;
        margin-top: 4px !important;
      }
      .logo-area img {
        width: 80px !important;
        height: 80px !important;
      }
      .brand-subtitle {
        font-size: 11px !important;
        margin-top: 4px !important;
      }
      .card {
        padding: 14px 16px !important;
        margin-bottom: 8px !important;
        border-radius: 16px !important;
      }
      .form-group {
        margin-bottom: 10px !important;
      }
      .form-label {
        font-size: 11px !important;
        margin-bottom: 4px !important;
      }
      .form-input {
        padding: 10px 34px 10px 12px !important;
        font-size: 13px !important;
      }
      .submit-btn {
        padding: 10px !important;
        font-size: 13px !important;
      }
      .separator {
        margin: 10px 0 !important;
        font-size: 11px !important;
      }
      .google-btn {
        padding: 10px !important;
        font-size: 13px !important;
      }
      .badge-container {
        margin-bottom: 12px !important;
      }
      .detected-badge {
        padding: 6px 12px !important;
        font-size: 11px !important;
      }
    }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- LOGO BRAND AREA -->
  <div class="logo-area" style="margin-top: 16px; text-align: center;">
    <img src="assets/logo.svg" alt="ZaLo" style="width: 150px; height: 150px; object-fit: contain; margin: 0 auto; display: block;" />
    <p class="brand-subtitle" style="margin-top: 8px;">نظام تسجيل الدخول الذكي الموحد</p>
  </div>

  <div class="card">
    <!-- Account Detected Badge -->
    <div class="badge-container">
      <a href="index.html" class="detected-badge badge-customer" id="roleBadge" style="text-decoration: none;">
        <i class="fa-solid fa-house" id="badgeIcon"></i>
        <span id="badgeText">الواجهة الرئيسية</span>
      </a>
    </div>

    <div class="error-msg" id="errorMessage"></div>

    <form id="unifiedLoginForm">
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني للذكاء الموحد</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-envelope input-icon"></i>
          <input type="email" class="form-input" id="loginEmail" placeholder="example@domain.com" required autocomplete="email">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">كلمة المرور الآمنة</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" class="form-input" id="loginPass" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <span>تأكيد وتسجيل الدخول الموحد</span> <i class="fa-solid fa-arrow-left"></i>
      </button>

      <div class="separator">أو الدخول الآمن عبر Google</div>

      <button type="button" class="google-btn" id="googleBtn">
        <img src="https://images.unsplash.com/photo-1573804633927-bfcbcd909acd?auto=format&fit=crop&w=32&h=32" alt="G" style="width:18px;height:18px;border-radius:50%">
        <span>الدخول السريع عبر Google</span>
      </button>
    </form>

    <div style="text-align: center; margin-top: 20px; font-size: 13px;">
      <a href="register-step1.html" style="color: var(--gold2); text-decoration: none; font-weight: 800;">تقديم طلب شريك تجاري جديد <i class="fa-solid fa-arrow-left"></i></a>
    </div>
  </div>

</div>

<!-- Supabase Integration -->
<script type="module">
  import { supabase } from './js/supabase-config.js';

  const form = document.getElementById('unifiedLoginForm');
  const emailInput = document.getElementById('loginEmail');
  const errorEl = document.getElementById('errorMessage');
  const submitBtn = document.getElementById('submitBtn');

  const roleBadge = document.getElementById('roleBadge');
  const badgeIcon = document.getElementById('badgeIcon');
  const badgeText = document.getElementById('badgeText');

  const AD_LIST = [
    'zinzinochop@gmail.com',
    'admin@zalo.dz',
    'admin@zalo.com',
    'manager@zalo.dz',
    'manager@zalo.com'
  ];

  function showError(msg) {
    errorEl.innerHTML = msg;
    errorEl.style.display = 'block';
  }

  // Update design badge state
  function updateBadge(role) {
    roleBadge.className = 'detected-badge';
    if (role === 'admin') {
      roleBadge.classList.add('badge-admin');
      badgeIcon.className = 'fa-solid fa-user-shield';
      badgeText.innerHTML = '🛡️ حساب إداري (المدير المعتمد)';
    } else if (role === 'merchant') {
      roleBadge.classList.add('badge-merchant');
      badgeIcon.className = 'fa-solid fa-store';
      badgeText.innerHTML = '🏪 حساب تاجر وشريك معتمد';
    } else {
      roleBadge.classList.add('badge-customer');
      badgeIcon.className = 'fa-solid fa-house';
      badgeText.innerHTML = 'الواجهة الرئيسية';
    }
  }

  // Real-time detection logic on typing
  let queryTimer = null;
  async function performDetection(email) {
    email = email.trim().toLowerCase();
    if (!email || !email.includes('@')) {
      updateBadge('customer');
      return;
    }

    // 1. Direct admin check
    if (AD_LIST.includes(email)) {
      updateBadge('admin');
      return;
    }

    // 2. Direct merchant email triggers
    if (email.includes('merchant') || email.includes('shop') || email === 'merchant@zalo.com') {
      updateBadge('merchant');
      return;
    }

    // 3. Smart check Supabase for matching shops or merchant_requests
    try {
      const { data: shops } = await supabase.from('shops').select('email').eq('email', email);
      if (shops && shops.length > 0) {
        updateBadge('merchant');
        return;
      }

      const { data: requests } = await supabase.from('merchant_requests').select('email').eq('email', email);
      if (requests && requests.length > 0) {
        updateBadge('merchant');
        return;
      }
    } catch (err) {
      console.warn("Supabase lookup silenced:", err);
    }

    updateBadge('customer');
  }

  emailInput.addEventListener('input', () => {
    const val = emailInput.value;
    clearTimeout(queryTimer);
    queryTimer = setTimeout(() => {
      performDetection(val);
    }, 400);
  });

  // Form submission and routing
  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.style.display = 'none';
    const email = emailInput.value.trim().toLowerCase();
    const pass = document.getElementById('loginPass').value;

    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.7';

    try {
      const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: pass
      });
      if (error) throw error;
      const user = data.user;

      // Ensure local state stores correct details
      localStorage.setItem('user_email', email);

      // Route 1: Admin
      if (AD_LIST.includes(email)) {
        sessionStorage.setItem('admin_logged_in_session', 'true');
        window.location.href = 'admin.html';
        return;
      }

      // Route 2: Active Store / Product manager
      const { data: shopSnap } = await supabase.from('shops').select('*').eq('id', user.id).maybeSingle();
      if (shopSnap) {
        window.location.href = 'dashboard.html';
        return;
      }

      // Route 3: Pending approved Merchant requests
      const { data: requests } = await supabase.from('merchant_requests').select('*').eq('email', email);
      if (requests && requests.length > 0) {
        const reqData = requests[0];
        const shopData = {
          id: user.id,
          storeName: reqData.storeName || "متجري الشريك المعتمد",
          ownerName: reqData.ownerName || "تاجر شريك",
          email: user.email,
          phone: reqData.phone || "",
          whatsapp: reqData.whatsapp || reqData.phone || "",
          wilaya: reqData.wilaya || "",
          commune: reqData.commune || "",
          address: reqData.address || "",
          category: reqData.category || "عام",
          workHours: "08:00 - 20:00",
          description: reqData.description || "",
          status: 'active',
          subscription: 'basic',
          createdAt: new Date().toISOString()
        };
        await supabase.from('shops').upsert(shopData);
        window.location.href = 'dashboard.html';
        return;
      }

      // Route 4: Normal customer
      window.location.href = 'index.html';

    } catch (error) {
      console.error(error);
      let arabicError = "البريد الإلكتروني أو كلمة المرور غير صحيحة، يرجى التحقق وإعادة المحاولة.";
      showError(arabicError);
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
    }
  });

  // Handle Google Sign-in action
  document.getElementById('googleBtn').addEventListener('click', async () => {
    errorEl.style.display = 'none';
    if (window.AndroidInterface && typeof window.AndroidInterface.requestGoogleSignIn === 'function') {
      try {
        window.AndroidInterface.requestGoogleSignIn();
      } catch (err) {
        console.error("Native Google sign-in failure, calling Web OAuth fallback:", err);
        fallbackToWebOAuth();
      }
    } else {
      fallbackToWebOAuth();
    }
  });

  async function fallbackToWebOAuth() {
    try {
      // Dynamic Redirect URL to support both GitHub Pages subfolders and local development
      let redirectUrl = "https://hadi47hadi58-cmyk.github.io/ZaLo-marketplace-smart-/web/index.html";
      if (window.location.hostname === 'localhost' || window.location.hostname.includes('run.app') || window.location.hostname.includes('127.0.0.1')) {
        redirectUrl = window.location.origin + window.location.pathname.replace('login.html', 'index.html');
      }
      
      const { data, error } = await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: redirectUrl
        }
      });
      if (error) throw error;
    } catch (error) {
      console.error(error);
      showError("حدث قصور أثناء مصادقة الحساب مع خوادم Google.");
    }
  }

  // Define global callbacks for Android native integration
  window.onGoogleIdTokenReceived = async function(idToken) {
    errorEl.style.display = 'none';
    try {
      const submitBtn = document.getElementById('submitBtn');
      if (submitBtn) {
        submitBtn.disabled = true;
        submitBtn.style.opacity = '0.5';
      }
      
      const { data, error } = await supabase.auth.signInWithIdToken({
        provider: 'google',
        token: idToken
      });
      
      if (error) throw error;

      // Check if this email is an administrator
      const email = (data.user && data.user.email) ? data.user.email.toLowerCase().trim() : "";
      if (AD_LIST.includes(email)) {
        sessionStorage.setItem('admin_logged_in_session', 'true');
        window.location.href = "admin.html";
        return;
      }
      
      // Success! Redirect to registration step or main homepage
      window.location.href = "register-step1.html";
    } catch (error) {
      console.error("Supabase ID Token Auth failed:", error);
      showError("حدث خطأ أثناء الاتصال بـ Supabase باستخدام حساب جوجل: " + (error.message || error));
      const submitBtn = document.getElementById('submitBtn');
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.style.opacity = '1';
      }
    }
  };

  window.onGoogleIdTokenFailed = function(reason) {
    console.warn("Google native sign-in failed/cancelled:", reason);
    if (reason !== 'cancelled') {
      showError("فشل تسجيل الدخول باستخدام حساب جوجل: " + reason);
    }
  };
</script>

</body>
</html>
