<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>ZaLo - بوابة التجار الشركاء</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a5c2a">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    :root {
      --green: #1a5c2a;
      --green-light: #2d7a3a;
      --green-dark: #071a0b;
      --gold: #c9a84c;
      --gold2: #e8c97a;
      --bg: #080e0a;
      --card: #111a14;
      --border: #1e3028;
      --text: #e8f0ea;
      --text2: #7a9e83;
      --red: #ff4d4d;
    }

    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px 12px;
      position: relative;
      overflow-y: auto;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(26,92,42,0.2) 0%, transparent 60%);
      pointer-events: none;
    }

    .wrapper {
      width: 100%; max-width: 400px;
      position: relative; z-index: 10;
      animation: fadeUp 0.4s ease;
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(16px); }
      to { opacity:1; transform: translateY(0); }
    }

    .logo-area {
      text-align: center; margin-bottom: 8px;
    }
    .logo-img {
      width: 60px; height: 60px;
      margin: 0 auto 6px;
      display: block;
    }
    .brand-title {
      font-size: 18px; font-weight: 900; color: #fff;
    }
    .brand-subtitle {
      font-size: 11px; color: var(--gold2); font-weight: 600;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 16px 14px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.55);
    }

    .card-title {
      font-size: 16px; font-weight: 800; color: #fff;
      margin-bottom: 4px; text-align: center;
    }
    .card-desc {
      font-size: 11px; color: var(--text2); text-align: center; margin-bottom: 14px;
    }

    .form-group {
      margin-bottom: 10px; text-align: right;
    }
    .form-label {
      display: block; font-size: 11.5px; font-weight: 700;
      color: var(--gold2); margin-bottom: 4px;
    }
    .input-wrapper {
      position: relative;
    }
    .input-icon {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%); color: var(--text2); font-size: 12px;
    }
    .form-input {
      width: 100%;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 34px 10px 12px;
      color: #fff; font-family: inherit; font-size: 13px;
      transition: all 0.25s ease;
    }
    .form-input:focus {
      outline: none; border-color: var(--gold);
      box-shadow: 0 0 8px rgba(201,168,76,0.15);
      background: rgba(0,0,0,0.35);
    }

    .submit-btn {
      width: 100%; background: var(--green);
      border: 1px solid var(--gold);
      color: #fff; font-family: inherit; font-size: 14px; font-weight: 800;
      padding: 11px; border-radius: 12px; cursor: pointer;
      box-shadow: 0 6px 18px rgba(26,92,42,0.25);
      transition: all 0.25s ease;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }
    .submit-btn:hover {
      background: var(--green-light); transform: translateY(-1px);
    }
    .submit-btn:active { transform: translateY(0); }

    .separator {
      display: flex; align-items: center; text-align: center;
      margin: 12px 0; color: var(--text2); font-size: 11px;
    }
    .separator::before, .separator::after {
      content: ''; flex: 1; border-bottom: 1px solid var(--border);
    }
    .separator:not(:empty)::before { margin-left: 8px; }
    .separator:not(:empty)::after { margin-right: 8px; }

    .demo-btn {
      width: 100%; background: rgba(201,168,76,0.1); color: var(--gold2);
      border: 1px dashed var(--gold);
      font-family: inherit; font-size: 13px; font-weight: 700;
      padding: 10px; border-radius: 12px; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: all 0.2s;
    }
    .demo-btn:hover { background: rgba(201,168,76,0.18); transform: translateY(-1px); }

    .error-msg {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.2);
      color: var(--red); padding: 10px; border-radius: 12px;
      font-size: 12px; margin-bottom: 16px; text-align: center;
      display: none;
    }

    .footer-links {
      display: flex; justify-content: space-between; align-items: center;
      margin-top: 12px; font-size: 12px;
    }
    .footer-links a { color: var(--gold2); text-decoration: none; font-weight: 700; }
    .footer-links a:hover { text-decoration: underline; }
  </style>
</head>
<body>

<div class="wrapper">

  <!-- LOGO BRAND AREA -->
  <div class="logo-area" style="text-align: center;">
    <img src="assets/logo.svg" alt="ZaLo" style="width: 70px; height: 70px; object-fit: contain; margin: 0 auto; display: block;" />
    <h1 class="brand-title" style="margin-top: 6px;">بوابة التجار والشركاء</h1>
    <p class="brand-subtitle">إدارة المنتجات، الطلبات والمبيعات</p>
  </div>

  <div class="card">
    <h2 class="card-title">تسجيل دخول التاجر</h2>
    <p class="card-desc">تحكم بمتجرك وتواصل مع زبائنك بسهولة</p>

    <div class="error-msg" id="errorMessage"></div>

    <form id="merchantLoginForm">
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني للتاجر</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-store input-icon"></i>
          <input type="email" class="form-input" id="loginEmail" placeholder="merchant@brand.com" required>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">كلمة المرور الآمنة</label>
        <div class="input-wrapper">
          <i class="fa-solid fa-lock input-icon"></i>
          <input type="password" class="form-input" id="loginPass" placeholder="••••••••" required>
        </div>
      </div>

      <button type="submit" class="submit-btn" id="submitBtn">
        <span>دخول لوحة المتجر</span> <i class="fa-solid fa-circle-arrow-left"></i>
      </button>

      <div class="separator">حساب تجريبي للاختبار والمراجعة</div>

      <button type="button" class="demo-btn" id="demoBtn">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
        <span>الدخول السريع كتاجر تجريبي (Demo)</span>
      </button>
    </form>

    <div class="footer-links" style="justify-content: center; margin-top: 14px;">
      <a href="register-step1.html">تقديم طلب تسجيل شريك تجاري جديد <i class="fa-solid fa-arrow-left"></i></a>
    </div>
  </div>

</div>

<!-- Supabase Integration -->
<script type="module">
  import { supabase } from './js/supabase-config.js';

  const form = document.getElementById('merchantLoginForm');
  const errorEl = document.getElementById('errorMessage');
  const submitBtn = document.getElementById('submitBtn');

  function showError(msg) {
    errorEl.innerHTML = msg;
    errorEl.style.display = 'block';
  }

  async function verifyMerchantAndRedirect(user) {
    try {
      // Check if a shop doc exists
      const { data: shopSnap } = await supabase.from('shops').select('*').eq('id', user.id).maybeSingle();
      if (shopSnap) {
        window.location.href = 'dashboard.html';
        return;
      }

      // If not, self-heal via merchant_requests
      const uEmail = user.email ? user.email.trim().toLowerCase() : '';
      if (uEmail) {
        let { data: requests } = await supabase.from('merchant_requests').select('*').eq('email', uEmail);
        if (!requests || requests.length === 0) {
          const capitalizedEmail = uEmail.charAt(0).toUpperCase() + uEmail.slice(1);
          const { data: req2 } = await supabase.from('merchant_requests').select('*').eq('email', capitalizedEmail);
          requests = req2;
        }
        if (!requests || requests.length === 0) {
          const { data: req3 } = await supabase.from('merchant_requests').select('*').eq('email', uEmail.toUpperCase());
          requests = req3;
        }

        if (requests && requests.length > 0) {
          const reqData = requests[0];
          const shopData = {
            id: user.id,
            storeName: reqData.storeName || "متجري الشريك المعتمد",
            ownerName: reqData.ownerName || "تاجر شريك",
            email: user.email,
            phone: reqData.phone || "",
            whatsapp: reqData.whatsapp || reqData.phone || "",
            wilaya: reqData.wilaya || "",
            commune: reqData.commune || "",
            address: reqData.address || "",
            category: reqData.category || "عام",
            workHours: reqData.workHours || "08:00 - 20:00",
            description: reqData.description || "",
            logoURL: reqData.logoURL || "",
            facebookURL: reqData.facebook || reqData.facebookURL || "",
            instagramURL: reqData.instagram || reqData.instagramURL || "",
            tiktokURL: reqData.tiktokURL || "",
            telegramURL: reqData.telegramURL || "",
            status: 'active',
            subscription: 'basic',
            createdAt: new Date().toISOString()
          };
          await supabase.from('shops').upsert(shopData);
          window.location.href = 'dashboard.html';
          return;
        }
      }

      // Neither exists! Show alert
      showError("عذراً! الحساب المعروض غير مسجل كتاجر نشط في منصة ZaLo. يرجى تقديم طلب تسجيل متجر أولاً.");
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';

    } catch (err) {
      console.error(err);
      showError("حدث خطأ أثناء فحص حالة تفعيل المتجر. يرجى مراجعة الدعم الفني.");
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
    }
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.style.display = 'none';
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;

    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.7';

    try {
      const { data, error } = await supabase.auth.signInWithPassword({
        email: email,
        password: pass
      });
      if (error) throw error;
      await verifyMerchantAndRedirect(data.user);
    } catch (error) {
      console.error(error);
      let arabicError = "البريد الإلكتروني أو كلمة المرور غير صحيحة، يرجى التحقق وإعادة المحاولة.";
      showError(arabicError);
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
    }
  });

  document.getElementById('demoBtn').addEventListener('click', async () => {
    document.getElementById('loginEmail').value = 'merchant@zalo.com';
    document.getElementById('loginPass').value = '12345678';
    
    errorEl.style.display = 'none';
    submitBtn.disabled = true;
    submitBtn.style.opacity = '0.7';

    try {
      const { data, error } = await supabase.auth.signInWithPassword({
        email: 'merchant@zalo.com',
        password: '12345678'
      });
      if (error) throw error;
      await verifyMerchantAndRedirect(data.user);
    } catch (error) {
      console.error(error);
      showError("فشل الدخول السريع بالحساب التجريبي، يرجى إدخال البيانات يدوياً.");
      submitBtn.disabled = false;
      submitBtn.style.opacity = '1';
    }
  });
</script>

</body>
</html>
